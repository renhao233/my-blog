  <link rel="canonical" href="https://cqlrh.cn/">
  <!-- Open Graph -->
  <meta property="og:title" content="迷失在金童路">
  <meta property="og:description" content="记录技术、思考与生活的个人博客。">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="迷失在金童路">
  <meta name="twitter:description" content="记录技术、思考与生活的个人博客。">

  <!-- 资源 -->
  <link rel="icon" type="image/svg+xml" href="assets/logo-4-terminal-path.svg">
  <link rel="stylesheet" href="style.css">
  <!-- 结构化数据（JSON-LD） -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "迷失在金童路",
    "description": "记录技术、思考与生活的个人博客。",
    "url": "https://cqlrh.cn/",
    "author": { "@type": "Person", "name": "迷失在金童路" }
  }
  </script>
</head>
<body>
  <header>
    <a href="index.html" class="site-title">迷失在金童路</a>
    <nav>
      <a href="index.html" class="active">文章</a>
      <a href="about.html">关于</a>
    </nav>
  </header>

  <main>
    <ul class="post-list" id="post-list">
      <li class="post-item"><p class="post-excerpt">加载中...</p></li>
    </ul>
  </main>

  <footer>
    <p>&copy; 2026 迷失在金童路 · <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">渝ICP备2026015548号</a></p>
  </footer>

  <script>
    async function loadPosts() {
      try {
        const resp = await fetch('posts.json');
        const posts = await resp.json();
        const list = document.getElementById('post-list');
        list.innerHTML = '';

        posts.forEach(p => {
          const li = document.createElement('li');
          li.className = 'post-item';
          li.innerHTML = `
            <div class="post-date">${p.date}</div>
            <div class="post-title">
              <a href="post.html?slug=${p.slug}">${p.title}</a>
            </div>
            <p class="post-excerpt">${p.excerpt || ''}</p>
          `;
          list.appendChild(li);
        });

        if (posts.length === 0) {
          list.innerHTML = '<li class="post-item"><p class="post-excerpt">暂无文章</p></li>';
        }
      } catch (e) {
        document.getElementById('post-list').innerHTML =
          `<li class="post-item"><p class="post-excerpt">加载失败: ${e.message}</p></li>`;
      }
    }
    loadPosts();
  </script>
</body>
</html>
