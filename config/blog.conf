server {
    server_name cqlrh.cn www.cqlrh.cn;

    root /home/ubuntu/my-blog;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 256;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/cqlrh.cn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cqlrh.cn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}server {
    if ($host = www.cqlrh.cn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = cqlrh.cn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name cqlrh.cn www.cqlrh.cn;
    return 404; # managed by Certbot




}