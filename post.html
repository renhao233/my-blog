<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">文章</title>
  <link rel="stylesheet" href="../style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header>
    <a href="../index.html" class="site-title">迷失在金童路</a>
    <nav>
      <a href="../index.html">文章</a>
      <a href="../about.html">关于</a>
    </nav>
  </header>

  <main>
    <a href="../index.html" class="back-link">← 返回文章列表</a>

    <article>
      <div class="post-header">
        <h1 id="post-title">加载中...</h1>
        <div class="post-meta" id="post-meta"></div>
      </div>

      <div class="post-body" id="post-body">
        <p>加载中...</p>
      </div>
    </article>
  </main>

  <footer>
    <p>&copy; 2026 迷失在金童路 · Powered by plain HTML</p>
  </footer>

  <script>
    async function loadPost() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      if (!slug) {
        document.getElementById('post-body').innerHTML = '<p>未指定文章</p>';
        return;
      }

      try {
        const resp = await fetch(`../posts/${slug}.md`);
        if (!resp.ok) throw new Error('文章不存在');
        const raw = await resp.text();

        // 解析元数据
        const meta = {};
        let body = raw.replace(/<!--\s*(\w+):\s*(.+?)\s*-->/g, (_, key, val) => {
          meta[key] = val;
          return '';
        }).trim();

        // 渲染 Markdown
        document.getElementById('post-title').textContent = meta.title || slug;
        document.getElementById('page-title').textContent = (meta.title || slug) + ' · 迷失在金童路';
        document.getElementById('post-meta').textContent = meta.date || '';
        document.getElementById('post-body').innerHTML = marked.parse(body);
      } catch (e) {
        document.getElementById('post-body').innerHTML = `<p>加载失败: ${e.message}</p>`;
      }
    }
    loadPost();
  </script>
</body>
</html>
